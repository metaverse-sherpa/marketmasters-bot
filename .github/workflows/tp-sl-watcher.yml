name: TP/SL Watcher
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  watcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Watcher Script
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets/v2' }}
        run: python scripts/tp_sl_watcher.py

      - name: Commit state changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add active_positions.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update state from tp_sl_watcher"
          git push origin master || true
        shell: bash
