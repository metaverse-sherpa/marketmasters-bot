name: Run trading bot daily
on:
  schedule:
    - cron: '0 12 * * *'   # runs once daily at 12:00 UTC; adjust as needed
  workflow_dispatch:

jobs:
  run-bot:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      NODE_OPTIONS: '--no-deprecation'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Run trading bot
        id: run-bot
        env:
          MARKETMASTERS_API_KEY: ${{ secrets.MARKETMASTERS_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          # Provide sensible defaults for optional values so the workflow
          # doesn't require every non-secret env to be set in Secrets.
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets/v2' }}
          MARKETMASTERS_URL: ${{ secrets.MARKETMASTERS_URL || 'https://api.marketmasters.ai/v1/stocks/patterns' }}
          MARKETMASTERS_PARAMS: ${{ secrets.MARKETMASTERS_PARAMS || '{"status":"active","bullish":"true"}' }}
          ALPCACA_PERCENTAGE_PER_TRADE: ${{ secrets.ALPCACA_PERCENTAGE_PER_TRADE || '0.02' }}
          BREAKOUT_LIMIT_BUFFER: ${{ secrets.BREAKOUT_LIMIT_BUFFER || '0.01' }}
        run: |
          set -o pipefail
          # Capture output so we can inspect failures for "insufficient buying power"
          python trading_bot.py 2>&1 | tee run.log
          rc=${PIPESTATUS[0]}
          insufficient=false
          if [ $rc -ne 0 ]; then
            if grep -qi "insufficient buying power" run.log; then
              echo "Only insufficient buying power errors detected; treating workflow as success."
              insufficient=true
              rc=0
            fi
          fi
          echo "insufficient=${insufficient}" >> $GITHUB_OUTPUT
          exit $rc
        shell: bash

      - name: Create issue for insufficient buying power
        if: steps.run-bot.outputs.insufficient == 'true'
        uses: peter-evans/create-issue@v4
        with:
          title: "[MarketMasters Bot] Insufficient buying power — no trades placed"
          body: |
            The trading bot run on `${{ github.run_number }}` detected insufficient buying power and skipped placing new trades.

            Please increase buying power or review account settings to allow the bot to place trades.
          # Assign to the user who manually triggered the workflow (if any),
          # otherwise assign to the repository owner. Note: if the repository
          # owner is an organization, assignment may fail unless the owner
          # username is a valid assignee; in that case set the
          # `ALERT_GITHUB_USERNAME` secret to a valid user instead.
          assignees: ${{ github.event_name == 'workflow_dispatch' && github.actor || github.repository_owner }}