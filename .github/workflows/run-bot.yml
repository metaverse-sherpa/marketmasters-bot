name: Run trading bot daily
on:
  schedule:
    - cron: '0 12 * * *'   # runs once daily at 12:00 UTC; adjust as needed
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Run trading bot
        env:
          MARKETMASTERS_API_KEY: ${{ secrets.MARKETMASTERS_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          # Optional / non-secret configuration (map if you set them as secrets or variables)
          MARKETMASTERS_URL: ${{ secrets.MARKETMASTERS_URL }}
          MARKETMASTERS_PARAMS: ${{ secrets.MARKETMASTERS_PARAMS }}
          ALPCACA_PERCENTAGE_PER_TRADE: ${{ secrets.ALPCACA_PERCENTAGE_PER_TRADE }}
          BREAKOUT_LIMIT_BUFFER: ${{ secrets.BREAKOUT_LIMIT_BUFFER }}
        run: python trading_bot.py