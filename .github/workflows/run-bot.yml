name: Run trading bot daily
on:
  schedule:
    - cron: '0 12 * * *'   # runs once daily at 12:00 UTC; adjust as needed
  workflow_dispatch:

jobs:
  run-bot:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      NODE_OPTIONS: '--no-deprecation'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests

      - name: Run trading bot
        id: run-bot
        env:
          MARKETMASTERS_API_KEY: ${{ secrets.MARKETMASTERS_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          # Provide sensible defaults for optional values so the workflow
          # doesn't require every non-secret env to be set in Secrets.
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL || 'https://paper-api.alpaca.markets/v2' }}
          MARKETMASTERS_URL: ${{ secrets.MARKETMASTERS_URL || 'https://api.marketmasters.ai/v1/stocks/patterns' }}
          MARKETMASTERS_PARAMS: ${{ secrets.MARKETMASTERS_PARAMS || '{"status":"active","bullish":"true"}' }}
          ALPCACA_PERCENTAGE_PER_TRADE: ${{ secrets.ALPCACA_PERCENTAGE_PER_TRADE || '0.02' }}
          BREAKOUT_LIMIT_BUFFER: ${{ secrets.BREAKOUT_LIMIT_BUFFER || '0.01' }}
        run: |
          set -o pipefail
          # Capture output so we can inspect failures for "insufficient buying power"
          python trading_bot.py 2>&1 | tee run.log
          rc=${PIPESTATUS[0]}

          # Detect insufficient buying power anywhere in the log
          if grep -qi "insufficient buying power" run.log; then
            insufficient=true
          else
            insufficient=false
          fi

          # Detect any explicit ERROR lines (other failures)
          if grep -qi "^\s*ERROR:" run.log; then
            has_other_errors=true
          else
            has_other_errors=false
          fi

          # If the script failed (rc != 0) but the only issues were insufficient buying
          # power warnings (no other ERROR: lines), treat as success.
          if [ $rc -ne 0 ] && [ "$insufficient" = "true" ] && [ "$has_other_errors" = "false" ]; then
            echo "Only insufficient buying power errors detected; treating workflow as success."
            rc=0
          fi

          echo "insufficient=${insufficient}" >> $GITHUB_OUTPUT
          exit $rc
        shell: bash

      - name: Create issue for insufficient buying power (GitHub API)
        if: steps.run-bot.outputs.insufficient == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FALLBACK_ASSIGNEE: ${{ secrets.ALERT_GITHUB_USERNAME || '' }}
        run: |
          set -euo pipefail
          owner_repo="${GITHUB_REPOSITORY}"
          owner="${owner_repo%%/*}"
          repo="${owner_repo#*/}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            assignee="${GITHUB_ACTOR}"
          else
            if [ -n "${FALLBACK_ASSIGNEE}" ]; then
              assignee="${FALLBACK_ASSIGNEE}"
            else
              assignee="${GITHUB_REPOSITORY_OWNER}"
            fi
          fi

          title='[MarketMasters Bot] Insufficient buying power — no trades placed'
          body="The trading bot run on ${GITHUB_RUN_NUMBER} detected insufficient buying power and skipped placing new trades.\n\nPlease increase buying power or review account settings to allow the bot to place trades."

          payload=$(printf '{"title":"%s","body":"%s","assignees":["%s"]}' "$title" "$body" "$assignee")

          echo "Creating issue in ${owner}/${repo} assigned to ${assignee}"
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/issues" \
            -d "$payload")

          if [ "$http_code" -ne 201 ]; then
            echo "Failed to create issue (HTTP $http_code)"
            exit 1
          fi
        shell: bash

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '' }}
        run: |
          set -euo pipefail
          # Only send if run_summary.json exists and contains data worth sending
          if [ ! -f run_summary.json ]; then
            echo "No run_summary.json found; nothing to notify"
            exit 0
          fi

            python - <<'PY'
            import json,os,sys,requests
            fn='run_summary.json'
            try:
              s=json.load(open(fn))
            except Exception as e:
              print('Could not read run_summary.json:',e)
              sys.exit(0)

            new_orders=s.get('new_orders',[])
            insuff=s.get('insufficient_buying_power',False)
            if not new_orders and not insuff:
              print('No new orders and no insufficient buying power; nothing to notify')
              sys.exit(0)

            run_num=os.environ.get('GITHUB_RUN_NUMBER','?')
            text=f"MarketMasters Bot Run #{run_num}\n"
            if new_orders:
              text += f"New orders: {len(new_orders)}\n"
              for o in new_orders:
                text += f"{o.get('symbol')} — entry={o.get('entry_price')} sl={o.get('stop_loss')} tp={o.get('take_profit')} qty={o.get('qty')} order_id={o.get('order_id')}\n"
            if insuff:
              bad=s.get('insufficient_symbols',[])
              text += "WARNING: insufficient buying power for: " + ", ".join(bad) + "\n"

            token=os.environ.get('TELEGRAM_BOT_TOKEN','')
            chat=os.environ.get('TELEGRAM_CHAT_ID','')
            if not token or not chat:
              print('Missing Telegram secrets; not sending')
              sys.exit(0)

            resp=requests.post(f'https://api.telegram.org/bot{token}/sendMessage', data={'chat_id':chat,'text':text})
            print('Telegram response',resp.status_code, resp.text)
            if resp.status_code!=200:
              sys.exit(1)
            PY
        shell: bash